name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on tags like v1.0.0, v2.1.3, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Extract version from tag
      id: get_version
      run: |
        # Remove 'v' prefix if present (e.g., v1.0.0 -> 1.0.0)
        TAG_VERSION=${GITHUB_REF#refs/tags/}
        TAG_VERSION=${TAG_VERSION#v}
        echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT
        echo "Tag version: $TAG_VERSION"
    
    - name: Extract version from build.gradle.kts
      id: get_library_version
      run: |
        # Extract version from library/build.gradle.kts
        LIBRARY_VERSION=$(grep '^version = ' library/build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
        echo "LIBRARY_VERSION=$LIBRARY_VERSION" >> $GITHUB_OUTPUT
        echo "Library version: $LIBRARY_VERSION"
    
    - name: Validate versions match
      run: |
        TAG_VERSION=${{ steps.get_version.outputs.TAG_VERSION }}
        LIBRARY_VERSION=${{ steps.get_library_version.outputs.LIBRARY_VERSION }}
        
        echo "Comparing versions:"
        echo "  Tag version:     $TAG_VERSION"
        echo "  Library version: $LIBRARY_VERSION"
        
        if [ "$TAG_VERSION" != "$LIBRARY_VERSION" ]; then
          echo "❌ ERROR: Version mismatch!"
          echo "   Tag version ($TAG_VERSION) does not match library version ($LIBRARY_VERSION)"
          echo "   Please update the version in library/build.gradle.kts to match the tag"
          exit 1
        fi
        
        echo "✅ Version validation passed: $TAG_VERSION"
    
    - name: Build library
      run: ./gradlew :library:build --no-daemon --stacktrace
    
    - name: Run tests
      run: ./gradlew :library:test --no-daemon --stacktrace
    
    - name: Publish to Maven Central
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      run: ./gradlew :library:publishToMavenCentral --no-daemon --stacktrace
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: published-artifacts
        path: |
          library/build/libs/
          library/build/publications/
